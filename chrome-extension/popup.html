<!DOCTYPE html>
<html>
<head>
  <title>LinkedIn Outreach Helper</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 350px;
      padding: 15px;
    }
    textarea {
      width: 100%;
      resize: vertical;
      font-size: 14px;
      padding: 10px;
    }
    .section {
      margin-bottom: 15px;
    }
    .label {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="section">
    <div class="label">Who are you messaging?</div>
    <label><input type="radio" name="persona" value="hiring_manager"> Hiring Manager</label><br>
    <label><input type="radio" name="persona" value="pm"> Product Manager</label><br>
    <label><input type="radio" name="persona" value="direct_recruiter"> Direct Recruiter</label><br>
    <label><input type="radio" name="persona" value="recruiter"> Some Recruiter</label>
  </div>

  <div class="section">
    <div class="label">Message type</div>
    <label><input type="radio" name="message_type" value="connection_request"> LinkedIn Connection Request</label><br>
    <label><input type="radio" name="message_type" value="inmail"> LinkedIn InMail</label>
  </div>

  <div class="section">
    <div class="label">Job Description (Optional)</div>
    <textarea id="jobDescription" placeholder="Paste job description here..."></textarea>
  </div>

  <div class="section">
    <button id="generateBtn">Generate Message</button>
  </div>

  <div class="section">
    <div class="label">Generated Message</div>
    <textarea id="generatedMessage" readonly placeholder="Your message will appear here..." style="height: 500px;"></textarea>
  </div>

  <div class="section">
    <div class="label">Suggest a Revision (Optional)</div>
    <textarea id="revisionSuggestion" placeholder="E.g., Make it more casual or mention my internship..."></textarea>
    <button id="regenerateBtn">Regenerate with Revisions</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
